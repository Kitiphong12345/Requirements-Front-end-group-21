<main class="max-w-4xl mx-auto my-5 px-10">

    <h1 class="text-2xl font-bold mb-6 text-center">
        ตะกร้าสินค้าของคุณ

    <!--รายการสินค้า-->

        <!-- หัวตาราง -->
        <div class="cart-items mb-6">

            <ul id="cartList"></ul>

        </div>

    </section>

    <!--สรุปราคา-->
    <section class="bg-white shadow-md rounded-lg p-4">

        <div class="flex justify-between mb-2">
            <p>ค่าจัดส่ง <span id="shipping">0</span> บาท</p>
        </div>

        <div>

            </a>
        <!--ที่อยู่ที่บันทึกจะแสดงที่นี่-->
        <div id="address" class="mt-4 p-4 bg-gray-100 rounded">
        </div>
        
            

        <!-- ตัวเลือกการชำระเงิน -->
        <div class="mt-6 flex justify-end gap-4">

            <!--ปลายทาง-->
             
                <label class="flex items-center gap-2 border p-4 rounded cursor-pointer">
                    <input type="radio" name="payment" onclick="selectPayment('เก็บเงินปลายทาง')" checked>
                    <span class="font-semibold">เก็บเงินปลายทาง</span>
                </label>
            

            <!--ชำระผ่านธนาคาร-->
             
                <label class="flex items-center gap-2 border p-4 rounded cursor-pointer">
                    <input type="radio" name="payment" onclick="selectPayment('โอนผ่านธนาคาร')">
                    <span class="font-semibold">ชำระผ่านธนาคาร</span>
                </label>
            

            <!-- พร้อมเพย์ -->
                <label class="flex items-center gap-2 border p-4 rounded cursor-pointer">
                    <input type="radio" name="payment" onclick="selectPayment('พร้อมเพย์')">
                    <span class="font-semibold">พร้อมเพย์</span>
                </label>
             
        </div>

        <div class="mt-6 flex justify-end gap-4">

               เลือกซื้อสินค้าต่อ

            <button class="confirmPayment px-6 py-2 bg-lime-500 text-white font-bold rounded hover:bg-lime-600" onclick="confirmPayment()">

            </button>
        </div>


    </section>

</main>

<!--Footer -->
<footer class="text-center py-4 text-sm text-gray-500 mt-10">
    © 2026 Hand In Paw Pethome
</footer>

<script>

    function renderCart(){

    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const cartList = document.getElementById("cartList");
    const totalPrice = document.getElementById("totalPrice");
    const shippingElement = document.getElementById("shipping");
    const saved = JSON.parse(localStorage.getItem("address"));

    if(saved){
        document.getElementById("address").innerHTML = `
        ชื่อ: ${saved.fullname}<br>
        เบอร์: ${saved.phone}<br>
        ที่อยู่: ${saved.address} <br>
        อำเภอ/เขต: ${saved.district}<br>
        จังหวัด: ${saved.province}<br>
        รหัสไปรษณีย์: ${saved.zipcode}
        `;
    }

    const shipping = 10;

    cartList.innerHTML = "";

    let total = 0;

    cart.forEach((item,index)=>{

        const subtotal = item.price * item.quantity;
        total += subtotal;

        cartList.innerHTML += `
        <li class="grid grid-cols-5 items-center text-center mb-4">

            <div class="col-span-2 flex items-center gap-4 text-left">
                <img src="${item.image}" class="w-20 h-20 object-cover rounded">
                <span class="font-semibold">${item.name}</span>
            </div>

            <div>฿${item.price}</div>

            <div>${item.quantity}</div>

            <div>
                <button onclick="removeCartItem(${index})"
                class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">
                ลบ
                </button>
            </div>

        </li>
        `;
    });

    shippingElement.innerText = shipping;

    total += shipping;

    totalPrice.innerText = total;
}


function removeCartItem(index){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index,1);

    localStorage.setItem("cart", JSON.stringify(cart));
    
    
    renderCart();
}

function confirmPayment(){

    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const address = JSON.parse(localStorage.getItem("address"));

    if(cart.length === 0){
        alert("ไม่มีสินค้าในตะกร้า");
        return;
    }

    if(!address){
        alert("กรุณาเพิ่มที่อยู่ก่อน");
        return;
    }

    localStorage.removeItem("cart");

    window.location.href = "./Payment_completed.html";
}


renderCart();
</script>

    <script>
        function selectPayment(method) {
            document.getElementById("payment-method").innerText = method;
        }
    </script>

</body>
