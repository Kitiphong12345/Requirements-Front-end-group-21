<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เพิ่มที่อยู่</title>
<link rel="shortcut icon" href="../Pictures/Gemini_Generated_Image_5ohi8r5ohi8r5ohi.png" type="image/x-icon">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../Shopping cart/Shopping.css">
</head>
<body> 
<h3 class="flex flex-row space-x-5 h-14 bg-gradient-to-r from-cyan-500 to-blue-400 items-center justify-center font-bold ">
    <nav class="h-14 bg-gradient-to-r from-cyan-500 to-blue-500 flex items-center justify-center gap-6 font-bold">
        <a href="../Home-page/Home-page.html" class="hover:underline">
            <img src="https://e7.pngegg.com/pngimages/769/771/png-clipart-computer-icons-house-building-home-house-angle-building.png" alt="Company logo" title="Home" class="h-full w-12 rounded-xl">
        </a>
        <select class="rounded-md col-start-1 row-start-1 appearance-none  text-center w-40" aria-label="หมวดหมู่สินค้า">
                <option value="หมวดหมู่สินค้า" disabled selected class="hidden">หมวดหมู่สินค้า</option>
                <option value="../category/category.html">สินค้าทั้งหมด</option>
                <option value="../Pet food/Pet food.html">อาหารสัตว์เลี้ยง</option>
                <option value="../Pet care products/Pet care products.html">ผลิตภัณฑ์สัตว์เลี้ยง</option>
                <option value="../Pet toys/Pet toys.html">ของเล่นสัตว์เลี้ยง</option>
                <option value="../Pet supplies/Pet supplies.html">กระเป๋า/รถเข็น</option>
        </select>

        <script>
                const categorySelect = document.querySelector('select[aria-label="หมวดหมู่สินค้า"]');
                categorySelect.addEventListener('change', function() {
                    const selectedValue = this.value;
                    if (selectedValue) {
                        window.location.href = selectedValue;
                    }
                });
            </script>
            
        <a href="../Shopping cart/Shopping-cart.html" class="hover:underline">
            <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" alt="cart icon" class="w-6 inline-block ml-1">
        </a>
        <a href="../Profile/profile.html" class="hover:underline">
            <img src="https://tse1.mm.bing.net/th/id/OIP.2FAQg06FvvfETwJis8vFvwHaHa?cb=defcachec2&w=626&h=626&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Company logo" title="profile" class="h-full w-12 rounded-xl">
        </a>
    </nav>
</h3>

    <div class="bg-white p-6 rounded-lg shadow-md w-full max-w-md mx-auto mt-10">
        <h2 class="text-xl font-bold text-center mb-4">เพิ่มที่อยู่</h2>

        <form onsubmit="saveAddress(event)" class="flex flex-col gap-3">

            <input type="text" id="fullname" placeholder="ชื่อ-นามสกุล" class="bg-gray-100 p-2 rounded" required>
            <input type="text" id="phone" placeholder="เบอร์โทรศัพท์" class="bg-gray-100 p-2 rounded" maxlength="10" required>
            <textarea id="address" placeholder="ที่อยู่ (บ้านเลขที่ / ถนน / หมู่บ้าน)"
            class="bg-gray-100 p-2 rounded" required></textarea>
            <input type="text" id="district" placeholder="อำเภอ / เขต"
            class="bg-gray-100 p-2 rounded" required>
            <input type="text" id="province" placeholder="จังหวัด" class="bg-gray-100 p-2 rounded" required>
            <input type="text" id="zipcode" placeholder="รหัสไปรษณีย์" class="bg-gray-100 p-2 rounded" maxlength="5" required>
            <button type="submit"
                class="bg-blue-500 text-white py-2 rounded hover:bg-blue-600 transition">บันทึกที่อยู่
            </button>
            <p id="error" class="text-red-500 text-sm text-center"></p>
        </form>
        
        <hr class="my-4">
   
    </div>

<script>
function saveAddress(event) {

    event.preventDefault();

    const fullname = document.getElementById("fullname").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const district = document.getElementById("district").value.trim();
    const province = document.getElementById("province").value.trim();
    const zipcode = document.getElementById("zipcode").value.trim();
    const errorText = document.getElementById("error");

    errorText.innerText = "";

    if (!fullname || !phone || !address || !district || !province || !zipcode) {
        errorText.innerText = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
        return;
    }

    if (zipcode.length !== 5 || isNaN(zipcode)) {
        errorText.innerText = "รหัสไปรษณีย์ต้องเป็นตัวเลข 5 หลัก";
        return;
    }

    const addressData = {
        fullname,
        phone,
        address,
        district,
        province,
        zipcode
    };

    localStorage.setItem("address", JSON.stringify(addressData));

    alert("บันทึกที่อยู่สำเร็จ");

    window.location.href = "../Shopping cart/Shopping-cart.html";
}
</script>

</body>
</html>
