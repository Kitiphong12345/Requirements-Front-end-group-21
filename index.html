<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link rel="shortcut icon" href="./Pictures/Gemini_Generated_Image_5ohi8r5ohi8r5ohi.png" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-cyan-500 to-amber-200 flex items-center justify-center min-h-screen">
    
    <br>
    <div class="form-container max-w-4xl mx-auto my-5 px-5 py-1 bg-white rounded-lg shadow-md">
      <img src="./Pictures/489155c0-8023-4e62-9c58-345a203488d6.png" alt="Logo" class="h-32 mx-auto mb-4 rounded-lg">
      <p class="title">เข้าสู่ระบบ</p>
      <form class="form" onsubmit="validateForm(event)">
        <input type="email" id="email" class="input" placeholder="อีเมล"  required>
        <input type="password" id="password" class="input" placeholder="รหัสผ่าน" required>
        <p id="errorText" class="text-red-500 text-sm text-center"></p>
        <button class="form-btn" type="submit">เข้าสู่ระบบ</button>
      </form>
      <p class="sign-up-label text-sm text-center mt-4">
        หรือยังไม่มีบัญชีผู้ใช้?<span class="sign-up-link"><a class="text-sm" href="./register/register.html">สมัครสมาชิก</a></span>
      </p>

    </div>

<script>
function validateForm(event) {

    event.preventDefault(); // หยุดการ submit ปกติ
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorText = document.getElementById("errorText");

    errorText.innerText = "";

    if (email === "" || password === "") {
      errorText.innerText = "กรุณากรอกข้อมูลให้ครบ";
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
    }
    if (password !== "123456") {
    errorText.innerText = "รหัสไม่ถูกต้อง";
    return;
}

    // ทดสอบก่อนว่า JS ทำงานไหม
    console.log("กำลังไปหน้าใหม่...");

    alert("เข้าสู่ระบบสำเร็จ");

    // ไปหน้าอื่น
    window.location.href = "./Home-page/Home-page.html";
}
</script>
<br><br><br>
    
</body>
</html>
