<body class="bg-gray-100 font-sans">

            <img src="https://e7.pngegg.com/pngimages/769/771/png-clipart-computer-icons-house-building-home-house-angle-building.png" alt="Company logo" title="Home" class="h-full w-12 rounded-xl">
        </a>

        <select class="rounded-md col-start-1 row-start-1 appearance-none  text-center w-40" aria-label="หมวดหมู่สินค้า">
                <option value="หมวดหมู่สินค้า" disabled selected class="hidden">หมวดหมู่สินค้า</option>
                <option value="../category/category.html">สินค้าทั้งหมด</option>
                <option value="../Pet food/Pet food.html">อาหารสัตว์เลี้ยง</option>
                <option value="../Pet care products/Pet care products.html">ผลิตภัณฑ์สัตว์เลี้ยง</option>
                <option value="../Pet toys/Pet toys.html">ของเล่นสัตว์เลี้ยง</option>
                <option value="../Pet supplies/Pet supplies.html">กระเป๋า/รถเข็น</option>
        </select>

            <script>
                const categorySelect = document.querySelector('select[aria-label="หมวดหมู่สินค้า"]');
                categorySelect.addEventListener('change', function() {
                    const selectedValue = this.value;
                    if (selectedValue) {
                        window.location.href = selectedValue;

        <a href="../Shopping cart/Shopping-cart.html" class="hover:underline">

        </a>
        <a href="../Profile/profile.html" class="hover:underline">
            <img src="https://tse1.mm.bing.net/th/id/OIP.2FAQg06FvvfETwJis8vFvwHaHa?cb=defcachec2&w=626&h=626&rs=1&pid=ImgDetMain&o=7&rm=3" alt="Company logo" title="profile" class="h-full w-12 rounded-xl">
        </a>
    </nav>
    <br>
    
    <section class="mb-16">

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-2xl font-bold mb-6 text-center">
ประวัติการสั่งซื้อ
</h1>

<div id="orderList" class="space-y-4"></div>

<a href="../Home-page/Home-page.html"
class="block mt-6 text-center bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
กลับไปหน้าแรก
</a>

</div>

<script>

function loadOrders(){

const orders = JSON.parse(localStorage.getItem("orders")) || [];
const orderList = document.getElementById("orderList");

if(orders.length === 0){
orderList.innerHTML = "ยังไม่มีประวัติการสั่งซื้อ";
return;
}

orders.reverse().forEach(order => {

let itemsHTML = "";

order.items.forEach(item=>{
itemsHTML += `
<div class="flex justify-between border-b py-1">
<span>${item.name} x ${item.quantity}</span>
<span>฿${item.price * item.quantity}</span>
</div>
`;
});

orderList.innerHTML += `

<div class="bg-white p-4 rounded shadow">

<p class="font-bold">เลขคำสั่งซื้อ: ${order.id}</p>
<p class="text-gray-500 text-sm">${order.date}</p>

<div class="mt-2">
${itemsHTML}
</div>

<div class="mt-2 text-sm">
<p><b>ผู้รับ:</b> ${order.address.fullname}</p>
<p><b>ที่อยู่:</b> ${order.address.address} ${order.address.district} ${order.address.province}</p>
</div>

<p class="mt-2 text-green-600 font-semibold">${order.status}</p>

</div>
`;
});

}

loadOrders();

</script>

</body>
</html>
